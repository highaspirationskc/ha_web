# Dependabot config - weekly grouped updates
# - Patches and minors grouped
# - Major versions ignored by default
# - Last updated: 2025-03-17

version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rails:
        patterns:
          - "rails"
          - "action*"
      production:
        dependency-type: "production"
        exclude-patterns:
          - "rails"
      development:
        dependency-type: "development"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
